name: 새 repo 제안
description: KCU-Hub에 새 repo가 필요한지 검토합니다.
title: "[repo] "
labels:
  - proposal
body:
  - type: input
    id: repo-name
    attributes:
      label: 제안 repo 이름
      description: 소문자, 하이픈 중심의 짧은 이름을 권장합니다.
      placeholder: course-notes
    validations:
      required: true
  - type: textarea
    id: purpose
    attributes:
      label: repo 목적
      description: 이 repo가 오래 남길 지식이나 산출물을 적어 주세요.
    validations:
      required: true
  - type: textarea
    id: first-artifacts
    attributes:
      label: 첫 3개 산출물
      description: README 외에 바로 들어갈 문서, 자료, 템플릿을 적어 주세요.
    validations:
      required: true
  - type: textarea
    id: maintenance
    attributes:
      label: 유지보수 방식
      description: 정리 주기, review 기준, 완료 기준을 적어 주세요.
    validations:
      required: true
  - type: checkboxes
    id: fit
    attributes:
      label: 생성 기준 확인
      options:
        - label: 기존 repo의 폴더나 문서로 처리하기 어렵습니다.
          required: true
        - label: 월 1회 이상 업데이트할 이유가 있습니다.
          required: true
        - label: 공개 repo에 올려도 되는 자료만 포함합니다.
          required: true
